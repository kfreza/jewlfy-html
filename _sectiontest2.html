<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="assets/css/style.css">
<style>body{padding:40px}</style></head><body>
<section class="cs_testimonial_section">
  <div class="container">
    <div class="cs_testimonial_style_2">
      <div class="cs_testimonial_review">
        <div class="cs_section_heading_style_1"><h2 class="cs_section_title cs_fs_36 cs_semibold mb-0">Real Jewlfy Stories</h2></div>
        <div class="cs_testimonial_slider swiper" data-slides-per-view="1" data-loop="1" data-speed="600" data-pagination-type="progressbar">
          <div class="swiper-wrapper">
            <div class="swiper-slide"><div class="cs_review_card">
              <div class="cs_rating" data-rating="5"><div class="cs_rating_percentage"></div></div>
              <blockquote>"The moment I saw the ring, I cried."</blockquote>
              <div class="cs_review_author"><div class="cs_review_avatar"><img src="assets/img/avatar-1.jpg"></div>
              <div><h3 class="cs_review_name cs_fs_16 cs_medium mb-0">Michael Sarah</h3><p class="cs_review_label cs_fs_14 mb-0">Verified Purchase</p></div></div>
            </div></div>
            <div class="swiper-slide"><div class="cs_review_card">
              <div class="cs_rating" data-rating="5"><div class="cs_rating_percentage"></div></div>
              <blockquote>"Second review here."</blockquote>
              <div class="cs_review_author"><div class="cs_review_avatar"><img src="assets/img/avatar-1.jpg"></div>
              <div><h3 class="cs_review_name cs_fs_16 cs_medium mb-0">Marisol Vega</h3><p class="cs_review_label cs_fs_14 mb-0">Verified Purchase</p></div></div>
            </div></div>
          </div>
          <div class="cs_slider_controller_2">
            <div class="swiper-pagination cs_slider_progress"></div>
            <div class="cs_slider_nav">
              <button type="button" class="cs_slider_arrow cs_center slider-prev"><i class="ri-arrow-left-s-line"></i></button>
              <button type="button" class="cs_slider_arrow cs_center slider-next"><i class="ri-arrow-right-s-line"></i></button>
            </div>
          </div>
        </div>
      </div>
      <div class="cs_testimonial_media" style="outline:2px solid red">
        <div class="cs_review_media_lg"><img src="assets/img/testimonial-4.jpg"></div>
        <div class="cs_review_media_sm"><img src="assets/img/testimonial-3.jpg"></div>
        <div class="cs_review_stat cs_review_stat_top"><span class="cs_review_stat_value cs_fs_48 cs_semibold cs_primary_font cs_accent_color">4.98</span><span class="cs_review_stat_label cs_fs_14">Average rating</span></div>
        <div class="cs_review_stat cs_review_stat_bottom"><span class="cs_review_stat_value cs_fs_48 cs_semibold cs_primary_font cs_accent_color">5k+</span><span class="cs_review_stat_label cs_fs_14">Happy customers</span></div>
      </div>
    </div>
  </div>
</section>
<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/swiper.min.js"></script>
<script src="assets/js/main.js"></script>
</body></html>
